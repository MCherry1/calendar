<svg width="980" height="300" viewBox="0 0 980 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Command to Calendar View Flow</title>
  <desc id="desc">Flowchart showing !cal command through API to rendered default month view.</desc>
  <rect width="980" height="300" fill="#0a0f1a"/>
  <text x="30" y="45" fill="#f8fafc" font-family="Arial" font-size="28" font-weight="700">Runtime Flow: `!cal` → Calendar API → Default View</text>

  <rect x="30" y="95" width="190" height="120" rx="12" fill="#1d4ed8"/>
  <text x="55" y="145" fill="white" font-family="Arial" font-size="24" font-weight="700">User Input</text>
  <text x="70" y="175" fill="#dbeafe" font-family="Arial" font-size="22">!cal</text>

  <rect x="280" y="95" width="220" height="120" rx="12" fill="#0f766e"/>
  <text x="302" y="145" fill="white" font-family="Arial" font-size="22" font-weight="700">Command Router</text>
  <text x="308" y="175" fill="#ccfbf1" font-family="Arial" font-size="15">parses args + calendar type</text>

  <rect x="560" y="95" width="220" height="120" rx="12" fill="#7c3aed"/>
  <text x="583" y="145" fill="white" font-family="Arial" font-size="22" font-weight="700">Calendar API</text>
  <text x="590" y="175" fill="#ede9fe" font-family="Arial" font-size="15">builds month + metadata</text>

  <rect x="820" y="95" width="130" height="120" rx="12" fill="#b45309"/>
  <text x="839" y="145" fill="white" font-family="Arial" font-size="20" font-weight="700">Render</text>
  <text x="835" y="175" fill="#ffedd5" font-family="Arial" font-size="14">Default
view</text>

  <path d="M220 155 L280 155" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M500 155 L560 155" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M780 155 L820 155" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/>
    </marker>
  </defs>
</svg>
