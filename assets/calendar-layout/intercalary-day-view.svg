<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Harptos Intercalary Day Placement</title>
  <desc id="desc">Diagram showing Midsummer and Shieldmeet inserted between Flamerule and Eleasis.</desc>
  <rect width="900" height="520" fill="#0b1220"/>
  <text x="40" y="55" fill="#f3f4f6" font-family="Arial, sans-serif" font-size="30" font-weight="700">Intercalary Day Implementation (Harptos)</text>
  <text x="40" y="90" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Midsummer and Shieldmeet are outside normal 30-day month grids.</text>

  <rect x="40" y="130" width="240" height="300" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="60" y="170" fill="#e2e8f0" font-family="Arial" font-size="24" font-weight="700">Flamerule</text>
  <text x="60" y="205" fill="#93c5fd" font-family="Arial" font-size="16">30-day month</text>
  <text x="60" y="245" fill="#cbd5e1" font-family="Arial" font-size="15">... Day 28</text>
  <text x="60" y="270" fill="#cbd5e1" font-family="Arial" font-size="15">Day 29</text>
  <text x="60" y="295" fill="#cbd5e1" font-family="Arial" font-size="15">Day 30</text>

  <rect x="325" y="150" width="250" height="110" rx="12" fill="#14532d" stroke="#22c55e"/>
  <text x="345" y="185" fill="#dcfce7" font-family="Arial" font-size="22" font-weight="700">Midsummer</text>
  <text x="345" y="215" fill="#bbf7d0" font-family="Arial" font-size="15">Intercalary festival day</text>
  <text x="345" y="238" fill="#bbf7d0" font-family="Arial" font-size="15">not in tenday/month cell count</text>

  <rect x="325" y="280" width="250" height="90" rx="12" fill="#3f1d5b" stroke="#a855f7"/>
  <text x="345" y="315" fill="#f3e8ff" font-family="Arial" font-size="20" font-weight="700">Shieldmeet</text>
  <text x="345" y="340" fill="#e9d5ff" font-family="Arial" font-size="15">Leap-year only (year % 4 == 0)</text>

  <rect x="620" y="130" width="240" height="300" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="640" y="170" fill="#e2e8f0" font-family="Arial" font-size="24" font-weight="700">Eleasis</text>
  <text x="640" y="205" fill="#93c5fd" font-family="Arial" font-size="16">30-day month</text>
  <text x="640" y="245" fill="#cbd5e1" font-family="Arial" font-size="15">Day 1</text>
  <text x="640" y="270" fill="#cbd5e1" font-family="Arial" font-size="15">Day 2</text>
  <text x="640" y="295" fill="#cbd5e1" font-family="Arial" font-size="15">...</text>

  <path d="M280 270 C305 270, 310 205, 325 205" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M575 205 C595 205, 600 270, 620 270" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
</svg>
