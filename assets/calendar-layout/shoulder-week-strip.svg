<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shoulder Week Strip View</title>
  <desc id="desc">Illustrates adjacent week strips before and after the active month for context.</desc>
  <rect width="900" height="420" fill="#0b1020"/>
  <text x="40" y="52" fill="#f8fafc" font-family="Arial" font-size="30" font-weight="700">Adjacent Shoulder Week Strips</text>

  <text x="40" y="90" fill="#94a3b8" font-family="Arial" font-size="17">Previous month context</text>
  <g transform="translate(40,105)">
    <rect width="820" height="80" rx="10" fill="#1e293b" stroke="#334155"/>
    <g fill="#cbd5e1" font-family="Arial" font-size="16">
      <rect x="12" y="12" width="100" height="56" rx="8" fill="#334155"/><text x="42" y="46">29</text>
      <rect x="126" y="12" width="100" height="56" rx="8" fill="#334155"/><text x="156" y="46">30</text>
      <rect x="240" y="12" width="100" height="56" rx="8" fill="#0f766e"/><text x="271" y="46">1</text>
      <rect x="354" y="12" width="100" height="56" rx="8" fill="#0f766e"/><text x="385" y="46">2</text>
      <rect x="468" y="12" width="100" height="56" rx="8" fill="#0f766e"/><text x="499" y="46">3</text>
      <rect x="582" y="12" width="100" height="56" rx="8" fill="#0f766e"/><text x="613" y="46">4</text>
      <rect x="696" y="12" width="100" height="56" rx="8" fill="#0f766e"/><text x="727" y="46">5</text>
    </g>
  </g>

  <text x="40" y="235" fill="#94a3b8" font-family="Arial" font-size="17">Active month body</text>
  <rect x="40" y="250" width="820" height="70" rx="10" fill="#172554" stroke="#1d4ed8"/>
  <text x="65" y="292" fill="#bfdbfe" font-family="Arial" font-size="18">Weeks 2–4 rendered in full month grid...</text>

  <text x="40" y="355" fill="#94a3b8" font-family="Arial" font-size="17">Next month context</text>
  <g transform="translate(40,370)">
    <rect width="820" height="35" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="16" y="24" fill="#cbd5e1" font-family="Arial" font-size="14">30</text>
    <text x="130" y="24" fill="#cbd5e1" font-family="Arial" font-size="14">31</text>
    <text x="244" y="24" fill="#86efac" font-family="Arial" font-size="14">1</text>
    <text x="358" y="24" fill="#86efac" font-family="Arial" font-size="14">2</text>
    <text x="472" y="24" fill="#86efac" font-family="Arial" font-size="14">3</text>
    <text x="586" y="24" fill="#86efac" font-family="Arial" font-size="14">4</text>
    <text x="700" y="24" fill="#86efac" font-family="Arial" font-size="14">5</text>
  </g>
</svg>
