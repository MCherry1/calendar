<svg width="900" height="580" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Single Month Calendar View</title>
  <desc id="desc">Example 7-column month grid with highlighted current day and notes panel.</desc>
  <rect width="900" height="580" fill="#0f172a"/>
  <text x="40" y="55" fill="#f8fafc" font-family="Arial" font-size="30" font-weight="700">Single-Month View (Default Calendar UI)</text>

  <rect x="40" y="80" width="820" height="460" rx="14" fill="#111827" stroke="#374151"/>
  <text x="65" y="120" fill="#e5e7eb" font-family="Arial" font-size="24" font-weight="700">Sypheros 998 YK</text>

  <g font-family="Arial" font-size="14" fill="#93c5fd" font-weight="700">
    <text x="75" y="155">Sul</text><text x="180" y="155">Mol</text><text x="285" y="155">Zol</text><text x="390" y="155">Wir</text><text x="495" y="155">Zor</text><text x="600" y="155">Far</text><text x="705" y="155">Sar</text>
  </g>

  <g stroke="#334155" fill="#1f2937">
    <rect x="60" y="170" width="105" height="70"/><rect x="165" y="170" width="105" height="70"/><rect x="270" y="170" width="105" height="70"/><rect x="375" y="170" width="105" height="70"/><rect x="480" y="170" width="105" height="70"/><rect x="585" y="170" width="105" height="70"/><rect x="690" y="170" width="105" height="70"/>
    <rect x="60" y="240" width="105" height="70"/><rect x="165" y="240" width="105" height="70"/><rect x="270" y="240" width="105" height="70"/><rect x="375" y="240" width="105" height="70"/><rect x="480" y="240" width="105" height="70"/><rect x="585" y="240" width="105" height="70"/><rect x="690" y="240" width="105" height="70"/>
    <rect x="60" y="310" width="105" height="70"/><rect x="165" y="310" width="105" height="70"/><rect x="270" y="310" width="105" height="70"/><rect x="375" y="310" width="105" height="70"/><rect x="480" y="310" width="105" height="70"/><rect x="585" y="310" width="105" height="70"/><rect x="690" y="310" width="105" height="70"/>
    <rect x="60" y="380" width="105" height="70"/><rect x="165" y="380" width="105" height="70"/><rect x="270" y="380" width="105" height="70"/><rect x="375" y="380" width="105" height="70"/><rect x="480" y="380" width="105" height="70"/><rect x="585" y="380" width="105" height="70"/><rect x="690" y="380" width="105" height="70"/>
  </g>

  <rect x="375" y="240" width="105" height="70" fill="#1d4ed8" stroke="#93c5fd"/>
  <text x="420" y="280" fill="#ffffff" font-family="Arial" font-size="20" font-weight="700">15</text>

  <g fill="#d1d5db" font-family="Arial" font-size="16">
    <text x="95" y="210">1</text><text x="200" y="210">2</text><text x="305" y="210">3</text><text x="410" y="210">4</text><text x="515" y="210">5</text><text x="620" y="210">6</text><text x="725" y="210">7</text>
    <text x="95" y="280">8</text><text x="200" y="280">9</text><text x="300" y="280">10</text><text x="515" y="280">12</text><text x="620" y="280">13</text><text x="725" y="280">14</text>
    <text x="90" y="350">16</text><text x="195" y="350">17</text><text x="300" y="350">18</text><text x="405" y="350">19</text><text x="510" y="350">20</text><text x="615" y="350">21</text><text x="720" y="350">22</text>
    <text x="90" y="420">23</text><text x="195" y="420">24</text><text x="300" y="420">25</text><text x="405" y="420">26</text><text x="510" y="420">27</text><text x="615" y="420">28</text>
  </g>

  <text x="610" y="500" fill="#94a3b8" font-family="Arial" font-size="14">Highlighted cell = selected/current day</text>
</svg>
