# CI: typecheck, test, and build for calendar.js
# Runs on every push to main and on every pull request targeting main.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Build calendar.js
        run: npm run build
      - name: Smoke-check built bundle
        run: node ./test/calendar_smoke.mjs
      - name: Upload calendar.js artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calendar-js
          path: calendar.js
          if-no-files-found: error
          retention-days: 30
