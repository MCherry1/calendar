# CI: typecheck, test, and build for calendar.js
# Runs on every push to main and on every pull request targeting main.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Build calendar.js
        run: npm run build
