name: Release

# Publishes calendar.js as a GitHub Release asset. Two ways in:
#   - push to main: if package.json's version has no release yet, build and
#     publish it (this fires when an engine-bump PR — which bumps the patch
#     version — merges, so releases are automatic)
#   - pushing a v* tag: manual versioned release
on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build And Publish Release Asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release tag (pushed tag, or version bump on main)
        id: rel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            TAG="v$(node -p "require('./package.json').version")"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "release $TAG already exists; nothing to do"
              echo "release=false" >> "$GITHUB_OUTPUT"
            else
              echo "release=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - if: steps.rel.outputs.release == 'true'
        run: npm ci
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Type check
        if: steps.rel.outputs.release == 'true'
        run: npm run typecheck

      - name: Run tests
        if: steps.rel.outputs.release == 'true'
        run: npm test

      - name: Build calendar.js
        if: steps.rel.outputs.release == 'true'
        run: npm run build

      - name: Smoke-check built bundle
        if: steps.rel.outputs.release == 'true'
        run: node ./test/calendar_smoke.mjs

      - name: Create or update GitHub Release
        if: steps.rel.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.rel.outputs.tag }}
        run: |
          # On the push-to-main path the tag won't exist yet; anchor it to
          # the released commit before creating the release.
          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi
          NOTES="Party Buff's Roll20 Calendar $TAG_NAME.

          Download \`calendar.js\` below, paste it into your Roll20 game's API Scripts editor, and type \`!cal\` to start. See the README for the command reference."
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "$NOTES"
          gh release upload "$TAG_NAME" calendar.js --clobber
