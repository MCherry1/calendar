<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fantasy Calendar</title>
    <meta
      name="description"
      content="An interactive fantasy calendar tool with animated moon skies, planar orbits, and year-at-a-glance previews for Eberron, Faerûn, and more."
    >
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <div class="backdrop backdrop-one"></div>
    <div class="backdrop backdrop-two"></div>
    <main class="site-shell">

      <header class="title-strip">
        <span class="title-strip-name">Fantasy Calendar</span>
        <div class="cta-row">
          <a class="cta primary" href="https://github.com/mcherry1/calendar" target="_blank" rel="noreferrer">Repository</a>
          <a class="cta" href="https://github.com/mcherry1/calendar/releases" target="_blank" rel="noreferrer">Releases</a>
          <a class="cta" href="https://github.com/mcherry1/calendar/actions" target="_blank" rel="noreferrer">CI Artifact</a>
          <a class="cta" href="./style-samples.html">Style Samples</a>
        </div>
      </header>

      <div class="world-selector-bar">
        <div class="world-selector-left">
          <label class="world-selector-label">
            <span>World</span>
            <select id="hero-world"></select>
          </label>
          <label class="world-selector-label">
            <span>Seed</span>
            <input id="gallery-seed" type="text" placeholder="default" spellcheck="false" autocomplete="off">
          </label>
        </div>
        <div class="world-selector-right">
          <div id="world-summary" class="world-summary"></div>
          <button class="ghost-button" id="copy-link" type="button">Copy Scene URL</button>
        </div>
      </div>

      <section class="hero">
        <div class="hero-panel">
          <div class="control-grid">
            <label>
              <span>Year</span>
              <input id="hero-year" type="number" step="1">
            </label>
            <label>
              <span>Month / Festival</span>
              <select id="hero-slot"></select>
            </label>
            <label>
              <span>Day</span>
              <input id="hero-day" type="number" min="1" step="1">
            </label>
            <label>
              <span>Lunar Size</span>
              <select id="hero-lunar-size">
                <option value="useful" selected>Visually Useful</option>
                <option value="true">True Size</option>
              </select>
            </label>
            <label class="wide">
              <span>Time</span>
              <div class="time-joystick-wrap">
                <button id="hero-time-joystick" class="time-joystick" type="button" aria-label="Hold left/right to move time backward/forward">
                  <span class="time-joystick-center"></span>
                </button>
                <div id="hero-time-joystick-speed" class="time-joystick-speed">Hold to scrub time (±30m/hr/4hr/12hr/24hr)</div>
              </div>
              <output id="hero-time-label"></output>
            </label>
            <label>
              <span>Playback</span>
              <div class="playback-row">
                <button class="play-button" id="play-toggle" type="button">Play</button>
                <select id="hero-speed">
                  <option value="0.5">30m/s</option>
                  <option value="1">1hr/s</option>
                  <option value="4">4hrs/s</option>
                  <option value="12" selected>12 hr/s</option>
                  <option value="24">24hrs/s</option>
                </select>
              </div>
            </label>
          </div>

          <div class="hero-scene">
            <canvas id="sky-canvas" width="980" height="700" aria-label="Animated sky scene"></canvas>
            <div id="sky-tooltip" class="sky-tooltip" hidden></div>
            <div class="scene-readout">
              <div>
                <p class="readout-label">Current Scene</p>
                <h3 id="scene-date-label"></h3>
              </div>
              <p id="scene-subtitle"></p>
              <p id="scene-view-note" class="scene-view-note"></p>
            </div>
          </div>

          <div class="scene-grid">
            <div class="scene-card">
              <p class="scene-card-label">Moon Positions</p>
              <div id="moon-list"></div>
            </div>
            <div class="scene-card scene-card-wide" id="solar-system-card" hidden>
              <p class="scene-card-label">Solar System</p>
              <canvas id="solar-system-canvas" width="900" height="160" aria-label="Static solar system diagram"></canvas>
            </div>
            <div class="scene-card scene-card-planar" id="planar-card" hidden>
              <p class="scene-card-label">Planar Orbits</p>
              <div class="planar-controls">
                <label class="planar-speed-control">
                  <span>Planar Playback</span>
                  <div class="playback-row">
                    <button class="play-button" id="planar-play-toggle" type="button">Play</button>
                    <select id="planar-speed">
                      <option value="1" selected>1 day/s</option>
                      <option value="28">1 month/s</option>
                      <option value="168">6 months/s</option>
                      <option value="336">1 year/s</option>
                      <option value="1680">5 years/s</option>
                    </select>
                  </div>
                </label>
                <label class="planar-speed-control planar-scrub-control">
                  <span>Planar Scrub</span>
                  <div class="time-joystick-wrap">
                    <button id="planar-time-joystick" class="time-joystick" type="button" aria-label="Hold left/right to move planar time backward/forward">
                      <span class="time-joystick-center"></span>
                    </button>
                    <div id="planar-time-joystick-speed" class="time-joystick-speed">Hold to scrub planar time (±1d/1mo/6mo/1yr/5yr per sec)</div>
                  </div>
                </label>
              </div>
              <canvas id="planar-canvas" width="500" height="500" aria-label="Planar orbital diagram"></canvas>
              <div id="planar-legend"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="gallery-section">
        <div class="section-heading">
          <h2>Calendar Gallery</h2>
        </div>
        <div class="gallery-controls">
          <label>
            <span>Calendar source</span>
            <div class="multi-select-wrap" id="gallery-source-wrap">
              <button type="button" class="multi-select-toggle" id="gallery-source-toggle">All sources</button>
              <div class="multi-select-dropdown" id="gallery-source-dropdown" hidden></div>
            </div>
          </label>
          <label>
            <span>Current date</span>
            <div class="date-input-group">
              <input id="gallery-year" type="number" step="1">
              <select id="gallery-month"></select>
              <input id="gallery-day" type="number" min="1" step="1">
            </div>
          </label>
          <label id="gallery-variant-label" hidden>
            <span>Calendar variant</span>
            <select id="gallery-variant"></select>
          </label>
        </div>
        <div class="calendar-gallery" id="calendar-gallery"></div>
      </section>
    </main>
    <script type="module" src="./assets/main.js"></script>
  </body>
</html>
